# Test profile: lets the Spring context load offline (no Supabase / no live DB)
# so `contextLoads()` can run in `gradle build`/CI without the root .env.image.

# Liquibase is the only startup bean that eagerly opens a DB connection — disable it.
spring.liquibase.enabled=false

# R2DBC ConnectionFactory is built lazily; a dummy URL is enough for context load.
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/test
spring.r2dbc.username=test
spring.r2dbc.password=test

# Supabase Storage (@Value-injected beans need these present, values are irrelevant)
supabase.url=http://localhost
supabase.anon-key=test-anon-key
supabase.storage.bucket=test-bucket

# Auth / JWT (secret must be >= 32 chars for HS256)
app.jwt.secret=test-secret-000000000000000000000000000000
app.jwt.expiration-ms=86400000

# Bootstrap admin (AdminSeeder swallows DB errors, so these just need to resolve)
app.admin.email=admin@test.local
app.admin.password=Admin@12345
app.admin.name=Test Admin
app.admin.mobile=+8800000000000
