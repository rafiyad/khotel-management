# .env file import
spring.config.import=optional:file:.env[.properties]

# ── R2DBC (reactive) — transaction pooler port 6543 ──────────
spring.r2dbc.url=${SPRING.R2DBC.URL}
spring.r2dbc.username=${SPRING.R2DBC.USERNAME}
spring.r2dbc.password=${SPRING.R2DBC.PASSWORD}

# ── Liquibase (JDBC) — session pooler port 5432 ──────────────
spring.liquibase.url=${SPRING.LIQUIBASE.URL}
spring.liquibase.user=${SPRING.LIQUIBASE.USER}
spring.liquibase.password=${SPRING.LIQUIBASE.PASSWORD}
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml

# ── Logging ──────────────────────────────────────────────────
logging.level.org.springframework.data.r2dbc=DEBUG

# ── Supabase Storage ──────────────────────────────────────────
supabase.url=${SUPABASE.URL}
supabase.anon-key=${SUPABASE.ANON.KEY}
supabase.storage.bucket=${SUPABASE.STORAGE.BUCKET}

# Multipart - hard limit at framework level before reaches to handler
spring.webflux.multipart.max-file-size=4MB
spring.webflux.multipart.max-request-size=20MB



