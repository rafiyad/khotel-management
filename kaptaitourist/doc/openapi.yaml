openapi: 3.0.3
info:
  title: Kaptai Tourist API
  description: |
    Backend API for the Kaptai Tourist hotel platform.

    Image write endpoints use `multipart/form-data`; everything else is `application/json`.
    Routes are nested under an `Accept: application/json` predicate, so every request must
    send the `Accept: application/json` header.

    ## Authorization (data-driven RBAC + ownership)
    Send the JWT from `POST /auth/login` as `Authorization: Bearer <token>`. Every endpoint is
    authorized by role against the `permission` / `role_permission` / `role` tables (the
    `RbacFilter`); Spring Security only authenticates the token. Endpoints flagged
    `requires_ownership` additionally require a **HOTEL_OWNER to own the `{hotelId}` in the path**
    (recorded in `khotel_hotel_owner`); **ADMIN bypasses the ownership check** and manages every
    hotel. So a HOTEL_OWNER manages only their own hotels' rooms, images, facility assignments,
    bookings, and dashboard. Access rules:
    - **Public (no token):** register, login, `GET /hotel`, `GET /hotel/{hotelId}`, its rooms
      (`GET .../room`, `GET .../room/{roomId}`), `GET .../availability`, and all **facility
      reads** — the catalog (`GET /facility`, `/facility/{id}`) and the hotel/room facility lists
      (`GET /hotel/{id}/facility`, `GET /hotel/{id}/room/{id}/facility`) — so visitors can see
      amenities before booking. Facilities are also **embedded** in hotel and room responses.
      A USER can browse hotels/rooms and **book** a room, but cannot create/update/delete hotels.
    - **USER (any authenticated user):** `POST .../booking` (booking requires login),
      `GET /auth/me`, `GET /auth/profile`.
    - **HOTEL_OWNER (own hotels) or ADMIN (any):** create hotels; update/delete a hotel and its
      rooms; all **image** endpoints (reads included) and facility **assignment writes**
      (assign/remove) under `/hotel/{hotelId}/**` and `/image/...`; booking management
      (list/get/cancel); and the **hotel dashboard** (`GET /hotel/{hotelId}/dashboard`). A
      HOTEL_OWNER is restricted to hotels they own; ADMIN is not. **Image endpoints remain hidden
      from USER;** facility reads are public (above). (`POST /hotel` has no owner check — the
      creator is recorded as owner.)
    - **ADMIN only:** facility catalog writes (`POST/PUT/DELETE /facility`), user management
      (`/user/**`, promote).

    Creating a hotel records the creator in `khotel_hotel_owner`, which is what the ownership
    check consults. Endpoints below marked with the lock (`security: bearerAuth`) require a token;
    the role + ownership rules above are enforced server-side.
  version: 1.0.0
servers:
  - url: http://localhost:9090/api/v1
    description: Local development
tags:
  - name: Hotel
    description: Hotel management (CRUD)
  - name: Room
    description: Room management, nested under a hotel (CRUD). Responses embed the room's images.
  - name: Image
    description: Hotel image management
  - name: Facility
    description: Facility catalog (CRUD) and assignment of facilities to hotels and rooms.
  - name: Booking
    description: Date-aware room-type bookings. Availability is computed (total_units − overlapping non-cancelled units), not a stored counter.
  - name: Auth
    description: Registration, login (JWT), current user, and admin user management (RBAC).
  - name: Dashboard
    description: Owner/admin hotel dashboard and the admin platform-wide dashboard.

paths:
  /welcome:
    get:
      tags: [Auth]
      summary: Welcome / smoke test (public)
      description: No auth, no DB. Returns a static payload for health/smoke checks.
      operationId: welcome
      responses:
        '200':
          description: OK.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Welcome to the Kaptai Tourist API" }
                  status: { type: string, example: "UP" }

  /auth/register-owner:
    post:
      tags: [Auth]
      summary: Register as a hotel owner (public)
      description: >-
        Creates a USER and files a PENDING owner-enlistment request. HOTEL_OWNER is NOT granted
        until an admin approves. 409 if the email/mobile already exists.
      operationId: registerOwner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, hotelName]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                mobile: { type: string }
                gender: { type: string, enum: [MALE, FEMALE] }
                password: { type: string, format: password, minLength: 6 }
                hotelName: { type: string }
                message: { type: string, nullable: true }
      responses:
        '201': { description: Request filed. }
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }

  /owner-request:
    get:
      tags: [Auth]
      summary: List owner-enlistment requests (admin)
      description: Lists requests, newest first, joined with requester name/email. Optional status filter.
      operationId: listOwnerRequests
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [PENDING, APPROVED, REJECTED] }
      responses:
        '200': { description: Requests. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /owner-request/{requestId}/approve:
    post:
      tags: [Auth]
      summary: Approve an owner request (admin)
      description: Grants HOTEL_OWNER to the requester and marks the request APPROVED. 409 if already decided.
      operationId: approveOwnerRequest
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: requestId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Approved. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /owner-request/{requestId}/reject:
    post:
      tags: [Auth]
      summary: Reject an owner request (admin)
      description: Marks the request REJECTED. 409 if already decided.
      operationId: rejectOwnerRequest
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: requestId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Rejected. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }

  /owner/hotel:
    get:
      tags: [Hotel]
      summary: The caller's own hotels (owner/admin)
      description: Hotels owned by the authenticated user (via khotel_hotel_owner), enriched with rooms/images/facilities.
      operationId: getOwnerHotels
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Hotels.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HotelListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/hotel:
    get:
      tags: [Hotel]
      summary: All hotels for admin oversight (admin)
      description: Every hotel with its owners (name/email) and room-type/booking counts. No image enrichment.
      operationId: getAdminHotels
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Hotels. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /image/{hotelId}/{imageId}/primary:
    post:
      tags: [Image]
      summary: Set the hotel's cover image (owner/admin)
      description: Marks this hotel-gallery image primary, unsetting any prior primary (transactional).
      operationId: setHotelImagePrimary
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: hotelId, in: path, required: true, schema: { type: string } }
        - { name: imageId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Primary updated. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /hotel/{hotelId}/room/{roomId}/image/{imageId}/primary:
    post:
      tags: [Image]
      summary: Set a room's cover image (owner/admin)
      description: Marks this room image primary, unsetting any prior primary for the room (transactional).
      operationId: setRoomImagePrimary
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: hotelId, in: path, required: true, schema: { type: string } }
        - { name: roomId, in: path, required: true, schema: { type: string } }
        - { name: imageId, in: path, required: true, schema: { type: string } }
      responses:
        '200': { description: Primary updated. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /hotel:
    post:
      tags:
        - Hotel
      summary: Create a hotel
      description: Creates a new hotel; the creator is recorded in khotel_hotel_owner (not enforced today). Requires HOTEL_OWNER or ADMIN.
      operationId: createHotel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelRequest'
            example:
              name: "Lake View Resort"
              description: "Lakeside resort with panoramic views of Kaptai Lake."
              checkInTime: "14:00:00"
              checkOutTime: "12:00:00"
              mobile: "+8801700000000"
              email: "info@lakeview.example"
              website: "https://lakeview.example"
              address: "Kaptai, Rangamati"
              googleMapUrl: "https://maps.google.com/?q=Kaptai+Lake+View"
              createdBy: "admin"
      responses:
        '201':
          description: Hotel created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Hotel
      summary: List hotels (paginated, filterable)
      description: >-
        Lists hotels, paginated. Filter by `search` (case-insensitive name substring), `facility`
        (repeatable; keeps only hotels that have **all** the given hotel-level facilities), and/or a
        date window `checkIn`/`checkOut` (+ optional `guests`) that keeps only hotels with **≥1 room
        free for those dates**. Filters combine (AND). Public.
      operationId: getAllHotels
      parameters:
        - name: search
          in: query
          required: false
          description: Case-insensitive substring to match against hotel name. Omitted or blank returns all hotels.
          schema:
            type: string
          example: lakeside
        - name: facility
          in: query
          required: false
          description: >-
            Facility id to require. Repeatable — `?facility=<id1>&facility=<id2>` returns only hotels
            that have **all** listed facilities assigned at hotel level (ALL-match).
          schema:
            type: array
            items:
              type: string
          style: form
          explode: true
          example: ["11111111-aaaa-...", "22222222-bbbb-..."]
        - name: checkIn
          in: query
          required: false
          description: Stay start (yyyy-MM-dd). Must be sent with checkOut; both enable the availability filter.
          schema:
            type: string
            format: date
          example: "2026-08-01"
        - name: checkOut
          in: query
          required: false
          description: Stay end (yyyy-MM-dd, after checkIn).
          schema:
            type: string
            format: date
          example: "2026-08-04"
        - name: guests
          in: query
          required: false
          description: Minimum room capacity required (defaults to 1). Only meaningful with the date filter.
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: page
          in: query
          required: false
          description: Zero-based page index.
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          description: Page size (capped at 100).
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Hotels retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}:
    get:
      tags:
        - Hotel
      summary: Get a hotel by id
      operationId: getHotelById
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Hotel retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Hotel
      summary: Update a hotel (full replace)
      description: Replaces the hotel's fields. Omitted fields are set to null. `name` is required. Requires HOTEL_OWNER or ADMIN.
      operationId: updateHotel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelRequest'
      responses:
        '200':
          description: Hotel updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Hotel
      summary: Delete a hotel
      description: Deletes the hotel, its rooms, and all their images (storage objects + DB rows are removed; images cleaned before the cascade). Requires HOTEL_OWNER or ADMIN.
      operationId: deleteHotel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '204':
          description: Hotel deleted successfully. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room:
    post:
      tags:
        - Room
      summary: Create a room under a hotel
      security:
        - bearerAuth: []
      description: Creates a room for the given hotel. `roomName` is required; the hotel must exist (404 otherwise).
      operationId: createRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomRequest'
            example:
              roomName: "Deluxe King"
              capacity: 2
              roomType: "DELUXE"
              isAirConditioned: true
              description: "Spacious room with a king bed and lake view."
              prerequisites: "Valid ID required at check-in."
              pricePerNight: 1500.00
              discount: 100.00
              isAvailable: true
              createdBy: "admin"
      responses:
        '201':
          description: Room created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Room
      summary: List a hotel's rooms
      description: Returns all rooms for the hotel, each with its embedded images (ordered by display order).
      operationId: getAllRooms
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Rooms retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}:
    get:
      tags:
        - Room
      summary: Get a room by id
      operationId: getRoomById
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Room retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Room
      summary: Update a room (full replace)
      security:
        - bearerAuth: []
      description: Replaces the room's fields. Omitted fields fall back to defaults. `roomName` is required.
      operationId: updateRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomRequest'
      responses:
        '200':
          description: Room updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Room
      summary: Delete a room
      security:
        - bearerAuth: []
      description: Deletes the room and all its images (storage objects + image rows are removed first, then the room).
      operationId: deleteRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '204':
          description: Room deleted successfully. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/image:
    post:
      tags:
        - Image
      summary: Upload one or more images for a room
      security:
        - bearerAuth: []
      description: |
        Uploads image files for the given room (sets both hotelId and roomId).
        Files must be sent under the `files` multipart key.
      operationId: saveRoomImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  description: One or more image files (required, at least one).
                  items:
                    type: string
                    format: binary
                createdBy:
                  type: string
                  example: "admin"
                isThumbnail:
                  type: boolean
                  description: Whether the server should generate a 400×300 thumbnail for each image. Defaults to true.
                  default: true
            encoding:
              files:
                contentType: image/png, image/jpeg, image/webp
      responses:
        '200':
          description: Images uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Image
      summary: List a room's images
      operationId: getRoomImages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Images retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Image
      summary: Delete all images for a room
      security:
        - bearerAuth: []
      description: Deletes every image of the room (DB rows + best-effort storage objects).
      operationId: deleteAllRoomImages
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '204':
          description: All room images deleted. No content.
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/image/{imageId}:
    delete:
      tags:
        - Image
      summary: Delete a single room image
      security:
        - bearerAuth: []
      description: Deletes one image of the room (DB row + best-effort storage objects).
      operationId: deleteRoomImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/ImageId'
      responses:
        '204':
          description: Image deleted. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: |
        Creates a user with the default **USER** role. Public. `email` and `mobile` must be
        unique; a duplicate returns **409**.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: "Rafiyad"
              email: "rafiyad@example.com"
              mobile: "+8801700000000"
              password: "secret123"
      responses:
        '201':
          description: Registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in
      description: Verifies credentials and returns a JWT. Public.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "rafiyad@example.com"
              password: "secret123"
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get the current authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/profile:
    get:
      tags:
        - Auth
      summary: Get the current user's profile (masked)
      description: |
        Returns the authenticated user's own profile with **masked** contact details:
        the mobile shows only the last 4 digits, and the email shows only the last 4
        characters of the local part (before `@`).
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/change-password:
    post:
      tags:
        - Auth
      summary: Change your own password
      description: >-
        Self-service password change for any authenticated user (USER / HOTEL_OWNER / ADMIN).
        Verifies `currentPassword` before setting `newPassword` (min 6 chars, must differ from the
        current one). Note: existing JWTs remain valid until they expire (no token revocation yet).
      operationId: changePassword
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "Password changed successfully" }
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Not authenticated, or current password incorrect.
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user:
    get:
      tags:
        - Auth
      summary: List all users (admin only)
      operationId: listUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/{userId}/promote:
    post:
      tags:
        - Auth
      summary: Promote a user to HOTEL_OWNER (admin only)
      description: Grants the HOTEL_OWNER role so the user can create and manage hotels and their inventory.
      operationId: promoteToHotelOwner
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User promoted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /facility:
    post:
      tags:
        - Facility
      summary: Create a facility (catalog)
      security:
        - bearerAuth: []
      description: Adds a facility to the global catalog. `name` is required and unique.
      operationId: createFacility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityRequest'
            example:
              name: "Free WiFi"
              category: "CONNECTIVITY"
              icon: "wifi"
              description: "Wireless internet access"
              appliesTo: "BOTH"
              isActive: true
              createdBy: "admin"
      responses:
        '201':
          description: Facility created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Facility
      summary: List all facilities (catalog)
      operationId: getAllFacilities
      responses:
        '200':
          description: Facilities retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /facility/{facilityId}:
    get:
      tags:
        - Facility
      summary: Get a facility by id
      operationId: getFacilityById
      parameters:
        - $ref: '#/components/parameters/FacilityId'
      responses:
        '200':
          description: Facility retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Facility
      summary: Update a facility (full replace)
      security:
        - bearerAuth: []
      operationId: updateFacility
      parameters:
        - $ref: '#/components/parameters/FacilityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityRequest'
      responses:
        '200':
          description: Facility updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Facility
      summary: Delete a facility
      security:
        - bearerAuth: []
      description: Removes the facility from the catalog and unassigns it from all hotels/rooms (cascade).
      operationId: deleteFacility
      parameters:
        - $ref: '#/components/parameters/FacilityId'
      responses:
        '204':
          description: Facility deleted. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/facility:
    post:
      tags:
        - Facility
      summary: Assign a facility to a hotel
      security:
        - bearerAuth: []
      description: Assigns a catalog facility to the hotel with per-offering details. Idempotent (re-assigning updates the link). 404 if the hotel or facility is missing; 400 if the facility's appliesTo forbids HOTEL.
      operationId: assignFacilityToHotel
      parameters:
        - $ref: '#/components/parameters/HotelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityAssignmentRequest'
            example:
              facilityId: "11111111-aaaa-0000-0000-000000000003"
              isComplimentary: true
              notes: "Open 6am–10pm"
              createdBy: "admin"
      responses:
        '200':
          description: Facility assigned to the hotel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignedFacilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Facility
      summary: List a hotel's facilities
      operationId: getHotelFacilities
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Hotel facilities retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignedFacilityListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/facility/{facilityId}:
    delete:
      tags:
        - Facility
      summary: Unassign a facility from a hotel
      security:
        - bearerAuth: []
      operationId: unassignFacilityFromHotel
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/FacilityId'
      responses:
        '204':
          description: Facility unassigned. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/facility:
    post:
      tags:
        - Facility
      summary: Assign a facility to a room
      security:
        - bearerAuth: []
      description: Assigns a catalog facility to the room. Idempotent. 404 if the room or facility is missing; 400 if the facility's appliesTo forbids ROOM.
      operationId: assignFacilityToRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityAssignmentRequest'
            example:
              facilityId: "11111111-aaaa-0000-0000-000000000002"
              isComplimentary: false
              additionalCharge: 250.00
              notes: "Per person, per night"
              createdBy: "admin"
      responses:
        '200':
          description: Facility assigned to the room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignedFacilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Facility
      summary: List a room's facilities
      operationId: getRoomFacilities
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Room facilities retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignedFacilityListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/facility/{facilityId}:
    delete:
      tags:
        - Facility
      summary: Unassign a facility from a room
      security:
        - bearerAuth: []
      operationId: unassignFacilityFromRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/FacilityId'
      responses:
        '204':
          description: Facility unassigned. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/availability:
    get:
      tags:
        - Booking
      summary: Check room-type availability for a date range
      description: Returns units available (total_units − overlapping non-cancelled bookings) for the dates.
      operationId: checkAvailability
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
        - name: checkIn
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-07-01"
        - name: checkOut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-07-03"
        - name: units
          in: query
          required: false
          schema:
            type: integer
            default: 1
          example: 1
      responses:
        '200':
          description: Availability computed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/booking:
    post:
      tags:
        - Booking
      summary: Create a booking for a room type
      description: |
        Books `units` of the room type for `[checkIn, checkOut)`. **Requires login** — the
        booking is recorded against the authenticated user. Runs in a transaction with a row
        lock to prevent overselling. Returns 400 if not enough units are available for the
        dates, the dates are invalid, or check-in is in the past; 404 if the room is missing.
      operationId: createBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
            example:
              checkIn: "2026-07-01"
              checkOut: "2026-07-03"
              units: 1
              guestName: "Rafiyad"
              guestPhone: "+8801700000000"
              guestEmail: "guest@example.com"
              numberOfGuests: 2
              createdBy: "admin"
      responses:
        '201':
          description: Booking confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/booking:
    get:
      tags:
        - Booking
      summary: List a hotel's bookings
      security:
        - bearerAuth: []
      operationId: getHotelBookings
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Bookings retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/booking/{bookingId}:
    get:
      tags:
        - Booking
      summary: Get a booking by id
      security:
        - bearerAuth: []
      operationId: getBookingById
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/booking/{bookingId}/cancel:
    post:
      tags:
        - Booking
      summary: Cancel a booking
      security:
        - bearerAuth: []
      description: Sets the booking status to CANCELLED, which frees its units for the dates. Idempotent.
      operationId: cancelBooking
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/dashboard:
    get:
      tags:
        - Dashboard
      summary: Hotel dashboard (owner/admin)
      description: >-
        Live aggregate snapshot for a hotel: rooms available/booked tonight and occupancy, upcoming
        bookings with today's arrivals/departures and cancellations, upcoming revenue, facilities
        assigned/unavailable, and hotel image count. Requires HOTEL_OWNER (owning this hotel) or ADMIN.
      security:
        - bearerAuth: []
      operationId: getHotelDashboard
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Dashboard retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /admin/dashboard:
    get:
      tags:
        - Dashboard
      summary: Platform dashboard (admin only)
      description: >-
        Cross-hotel overview for admins: totals (hotels, owners, users, facilities), rooms
        booked/available tonight with occupancy, upcoming bookings with today's arrivals/departures
        and cancellations, and upcoming revenue — all summed across every hotel. Requires ADMIN.
      security:
        - bearerAuth: []
      operationId: getAdminDashboard
      responses:
        '200':
          description: Platform dashboard retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminDashboardResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /image/save/{hotelId}:
    post:
      tags:
        - Image
      summary: Upload one or more images for a hotel
      security:
        - bearerAuth: []
      description: |
        Uploads one or more image files for the given hotel. Files must be sent
        under the `files` multipart key. Returns the list of persisted image
        records.
      operationId: saveImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  description: One or more image files (required, at least one).
                  items:
                    type: string
                    format: binary
                createdBy:
                  type: string
                  description: Identifier of the user performing the upload.
                  example: "01518472276"
                isThumbnail:
                  type: boolean
                  description: Whether the server should generate a 400×300 thumbnail for each uploaded image. Defaults to true when omitted. (Note WebP cannot be thumbnailed and is skipped.)
                  default: true
                  example: true
            encoding:
              files:
                contentType: image/png, image/jpeg, image/webp
      responses:
        '200':
          description: Images uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
              example:
                message: "Images saved successfully"
                totalRecords: 1
                imageData:
                  - id: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
                    hotelId: "HTL-001"
                    fileUrl: "https://storage.example.com/hotels/HTL-001/room.png"
                    fileName: "room.png"
                    fileSizeBytes: 204812
                    roomId: null
                    thumbnailUrl: "https://storage.example.com/hotels/HTL-001/room_thumb.png"
                    isPrimary: false
                    displayOrder: 0
                    version: 0
                    mimeType: "image/png"
                    createdBy: "01518472276"
                    createdAt: "2025-09-21T15:33:27.429911"
                    updatedBy: null
                    updatedAt: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /image/{hotelId}:
    get:
      tags:
        - Image
      summary: Get all images for a hotel
      description: Retrieves all image records belonging to the given hotel.
      operationId: getAllByHotelId
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Images retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
              example:
                message: "Images fetched successfully"
                totalRecords: 2
                imageData:
                  - id: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
                    hotelId: "HTL-001"
                    fileUrl: "https://storage.example.com/hotels/HTL-001/room.png"
                    fileName: "room.png"
                    fileSizeBytes: 204812
                    roomId: null
                    thumbnailUrl: "https://storage.example.com/hotels/HTL-001/room_thumb.png"
                    isPrimary: true
                    displayOrder: 0
                    version: 0
                    mimeType: "image/png"
                    createdBy: "01518472276"
                    createdAt: "2025-09-21T15:33:27.429911"
                    updatedBy: null
                    updatedAt: null
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Image
      summary: Delete all images for a hotel
      security:
        - bearerAuth: []
      description: Deletes every image record (and associated stored files) for the given hotel.
      operationId: deleteAllByHotelId
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '204':
          description: All images for the hotel were deleted successfully. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /image/{hotelId}/{imageId}:
    get:
      tags:
        - Image
      summary: Get a single image by id
      description: Retrieves a single image record for the given hotel and image id.
      operationId: getImageById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/ImageId'
      responses:
        '200':
          description: Image retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSingleResponse'
              example:
                message: "Image fetched successfully"
                imageData:
                  id: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
                  hotelId: "HTL-001"
                  fileUrl: "https://storage.example.com/hotels/HTL-001/room.png"
                  fileName: "room.png"
                  fileSizeBytes: 204812
                  roomId: null
                  thumbnailUrl: "https://storage.example.com/hotels/HTL-001/room_thumb.png"
                  isPrimary: false
                  displayOrder: 0
                  version: 0
                  mimeType: "image/png"
                  createdBy: "01518472276"
                  createdAt: "2025-09-21T15:33:27.429911"
                  updatedBy: null
                  updatedAt: null
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Image
      summary: Replace an existing image
      security:
        - bearerAuth: []
      description: |
        Replaces the file of an existing image record. The new file must be sent
        under the `file` multipart key.
      operationId: updateImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/ImageId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Replacement image file (required).
                updatedBy:
                  type: string
                  description: Identifier of the user performing the update.
                  example: "01518472276"
                isThumbnail:
                  type: boolean
                  description: Whether to (re)generate a thumbnail for the replacement image. When omitted, the server keeps the previous behaviour (regenerates a thumbnail only if the existing image had one).
                  example: false
            encoding:
              file:
                contentType: image/png, image/jpeg, image/webp
      responses:
        '200':
          description: Image updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSingleResponse'
              example:
                message: "Image updated successfully"
                imageData:
                  id: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
                  hotelId: "HTL-001"
                  fileUrl: "https://storage.example.com/hotels/HTL-001/room-v2.png"
                  fileName: "room-v2.png"
                  fileSizeBytes: 256000
                  roomId: null
                  thumbnailUrl: "https://storage.example.com/hotels/HTL-001/room-v2_thumb.png"
                  isPrimary: false
                  displayOrder: 0
                  version: 1
                  mimeType: "image/png"
                  createdBy: "01518472276"
                  createdAt: "2025-09-21T15:33:27.429911"
                  updatedBy: "01518472276"
                  updatedAt: "2025-09-22T10:11:05.120004"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Image
      summary: Delete a single image
      security:
        - bearerAuth: []
      description: Deletes a single image record (and its stored file) for the given hotel and image id.
      operationId: deleteImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/ImageId'
      responses:
        '204':
          description: Image deleted successfully. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT from POST /auth/login, sent as `Authorization: Bearer <token>`."
  parameters:
    HotelId:
      name: hotelId
      in: path
      required: true
      description: Unique identifier of the hotel.
      schema:
        type: string
      example: "HTL-001"
    ImageId:
      name: imageId
      in: path
      required: true
      description: Unique identifier of the image.
      schema:
        type: string
      example: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
    RoomId:
      name: roomId
      in: path
      required: true
      description: Unique identifier of the room.
      schema:
        type: string
      example: "b7e2d1a0-1111-2222-3333-444455556666"
    FacilityId:
      name: facilityId
      in: path
      required: true
      description: Unique identifier of the facility.
      schema:
        type: string
      example: "11111111-aaaa-0000-0000-000000000001"
    BookingId:
      name: bookingId
      in: path
      required: true
      description: Unique identifier of the booking.
      schema:
        type: string
      example: "c1d2e3f4-aaaa-bbbb-cccc-000000000001"
    UserId:
      name: userId
      in: path
      required: true
      description: Unique identifier of the user.
      schema:
        type: string
      example: "d4e5f6a7-bbbb-cccc-dddd-000000000001"

  schemas:
    Image:
      type: object
      description: A persisted hotel image record.
      properties:
        id:
          type: string
          description: Unique identifier of the image.
          example: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
        hotelId:
          type: string
          description: Identifier of the hotel this image belongs to (tenant scope).
          example: "HTL-001"
        roomId:
          type: string
          nullable: true
          description: Identifier of the room this image belongs to. NULL for hotel-level (gallery) images; set for room-level images.
          example: null
        fileUrl:
          type: string
          description: Public URL of the stored image file.
