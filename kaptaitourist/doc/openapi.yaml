openapi: 3.0.3
info:
  title: Kaptai Tourist API
  description: |
    Backend API for the Kaptai Tourist hotel platform.

    Image write endpoints use `multipart/form-data`; everything else is `application/json`.
    Routes are nested under an `Accept: application/json` predicate, so every request must
    send the `Accept: application/json` header.

    ## Authorization (RBAC + ownership)
    Send the JWT from `POST /auth/login` as `Authorization: Bearer <token>`. Access rules:
    - **Public (no token):** register, login, `GET /hotel`, `GET /hotel/{hotelId}`, its rooms
      (`GET .../room`, `GET .../room/{roomId}`), and `GET .../availability`. A USER can browse
      hotels/rooms and **book** a room, but cannot create/update/delete hotels.
    - **Any authenticated user:** `POST .../booking` (booking requires login), `GET /auth/me`, `GET /auth/profile`.
    - **HOTEL_OWNER (their own hotel) or ADMIN:** create/update/delete hotels, rooms, and **all
      image and facility-assignment endpoints — reads included** — under `/hotel/{hotelId}/**`
      and `/image/...`; booking management (list/get/cancel) for that hotel. **Image and
      facility endpoints are hidden from USER.** The facility **catalog** (`GET /facility`,
      `/facility/{id}`) is visible to any HOTEL_OWNER or ADMIN.
    - **ADMIN only:** facility catalog writes (`POST/PUT/DELETE /facility`), user management
      (`/user/**`, promote).

    Creating a hotel records the creator as its owner. Endpoints below marked with the lock
    (`security: bearerAuth`) require a token; owner/admin rules are enforced server-side.
  version: 1.0.0
servers:
  - url: http://localhost:9090/api/v1
    description: Local development
tags:
  - name: Hotel
    description: Hotel management (CRUD)
  - name: Room
    description: Room management, nested under a hotel (CRUD). Responses embed the room's images.
  - name: Image
    description: Hotel image management
  - name: Facility
    description: Facility catalog (CRUD) and assignment of facilities to hotels and rooms.
  - name: Booking
    description: Date-aware room-type bookings. Availability is computed (total_units − overlapping non-cancelled units), not a stored counter.
  - name: Auth
    description: Registration, login (JWT), current user, and admin user management (RBAC).

paths:
  /hotel:
    post:
      tags:
        - Hotel
      summary: Create a hotel
      description: Creates a new hotel; the authenticated user becomes its owner. Requires HOTEL_OWNER or ADMIN.
      operationId: createHotel
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelRequest'
            example:
              name: "Lake View Resort"
              description: "Lakeside resort with panoramic views of Kaptai Lake."
              checkInTime: "14:00:00"
              checkOutTime: "12:00:00"
              mobile: "+8801700000000"
              email: "info@lakeview.example"
              website: "https://lakeview.example"
              address: "Kaptai, Rangamati"
              googleMapUrl: "https://maps.google.com/?q=Kaptai+Lake+View"
              createdBy: "admin"
      responses:
        '201':
          description: Hotel created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Hotel
      summary: List all hotels
      operationId: getAllHotels
      responses:
        '200':
          description: Hotels retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}:
    get:
      tags:
        - Hotel
      summary: Get a hotel by id
      operationId: getHotelById
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Hotel retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Hotel
      summary: Update a hotel (full replace)
      description: Replaces the hotel's fields. Omitted fields are set to null. `name` is required. Owner of this hotel or ADMIN.
      operationId: updateHotel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelRequest'
      responses:
        '200':
          description: Hotel updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Hotel
      summary: Delete a hotel
      description: Deletes the hotel, its rooms, and all their images (storage objects + DB rows are removed; images cleaned before the cascade). Owner of this hotel or ADMIN.
      operationId: deleteHotel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '204':
          description: Hotel deleted successfully. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room:
    post:
      tags:
        - Room
      summary: Create a room under a hotel
      description: Creates a room for the given hotel. `roomName` is required; the hotel must exist (404 otherwise).
      operationId: createRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomRequest'
            example:
              roomName: "Deluxe King"
              capacity: 2
              roomType: "DELUXE"
              isAirConditioned: true
              description: "Spacious room with a king bed and lake view."
              prerequisites: "Valid ID required at check-in."
              pricePerNight: 1500.00
              discount: 100.00
              isAvailable: true
              createdBy: "admin"
      responses:
        '201':
          description: Room created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Room
      summary: List a hotel's rooms
      description: Returns all rooms for the hotel, each with its embedded images (ordered by display order).
      operationId: getAllRooms
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Rooms retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}:
    get:
      tags:
        - Room
      summary: Get a room by id
      operationId: getRoomById
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Room retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Room
      summary: Update a room (full replace)
      description: Replaces the room's fields. Omitted fields fall back to defaults. `roomName` is required.
      operationId: updateRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RoomRequest'
      responses:
        '200':
          description: Room updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoomResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Room
      summary: Delete a room
      description: Deletes the room and all its images (storage objects + image rows are removed first, then the room).
      operationId: deleteRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '204':
          description: Room deleted successfully. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/image:
    post:
      tags:
        - Image
      summary: Upload one or more images for a room
      description: |
        Uploads image files for the given room (sets both hotelId and roomId).
        Files must be sent under the `files` multipart key.
      operationId: saveRoomImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  description: One or more image files (required, at least one).
                  items:
                    type: string
                    format: binary
                createdBy:
                  type: string
                  example: "admin"
                isThumbnail:
                  type: boolean
                  description: Whether the server should generate a 400×300 thumbnail for each image. Defaults to true.
                  default: true
            encoding:
              files:
                contentType: image/png, image/jpeg, image/webp
      responses:
        '200':
          description: Images uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Image
      summary: List a room's images
      operationId: getRoomImages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Images retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Image
      summary: Delete all images for a room
      description: Deletes every image of the room (DB rows + best-effort storage objects).
      operationId: deleteAllRoomImages
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '204':
          description: All room images deleted. No content.
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/image/{imageId}:
    delete:
      tags:
        - Image
      summary: Delete a single room image
      description: Deletes one image of the room (DB row + best-effort storage objects).
      operationId: deleteRoomImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/ImageId'
      responses:
        '204':
          description: Image deleted. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      description: |
        Creates a user with the default **USER** role. Public. `email` and `mobile` must be
        unique; a duplicate returns **409**.
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: "Rafiyad"
              email: "rafiyad@example.com"
              mobile: "+8801700000000"
              password: "secret123"
      responses:
        '201':
          description: Registered.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in
      description: Verifies credentials and returns a JWT. Public.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: "rafiyad@example.com"
              password: "secret123"
      responses:
        '200':
          description: Authenticated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get the current authenticated user
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /auth/profile:
    get:
      tags:
        - Auth
      summary: Get the current user's profile (masked)
      description: |
        Returns the authenticated user's own profile with **masked** contact details:
        the mobile shows only the last 4 digits, and the email shows only the last 4
        characters of the local part (before `@`).
      operationId: getProfile
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProfileResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user:
    get:
      tags:
        - Auth
      summary: List all users (admin only)
      operationId: listUsers
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Users retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /user/{userId}/promote:
    post:
      tags:
        - Auth
      summary: Promote a user to HOTEL_OWNER (admin only)
      description: Grants the HOTEL_OWNER role so the user can create and manage their own hotel.
      operationId: promoteToHotelOwner
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User promoted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /facility:
    post:
      tags:
        - Facility
      summary: Create a facility (catalog)
      description: Adds a facility to the global catalog. `name` is required and unique.
      operationId: createFacility
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityRequest'
            example:
              name: "Free WiFi"
              category: "CONNECTIVITY"
              icon: "wifi"
              description: "Wireless internet access"
              appliesTo: "BOTH"
              isActive: true
              createdBy: "admin"
      responses:
        '201':
          description: Facility created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Facility
      summary: List all facilities (catalog)
      operationId: getAllFacilities
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Facilities retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /facility/{facilityId}:
    get:
      tags:
        - Facility
      summary: Get a facility by id
      operationId: getFacilityById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/FacilityId'
      responses:
        '200':
          description: Facility retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    put:
      tags:
        - Facility
      summary: Update a facility (full replace)
      operationId: updateFacility
      parameters:
        - $ref: '#/components/parameters/FacilityId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityRequest'
      responses:
        '200':
          description: Facility updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FacilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - Facility
      summary: Delete a facility
      description: Removes the facility from the catalog and unassigns it from all hotels/rooms (cascade).
      operationId: deleteFacility
      parameters:
        - $ref: '#/components/parameters/FacilityId'
      responses:
        '204':
          description: Facility deleted. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/facility:
    post:
      tags:
        - Facility
      summary: Assign a facility to a hotel
      description: Assigns a catalog facility to the hotel with per-offering details. Idempotent (re-assigning updates the link). 404 if the hotel or facility is missing; 400 if the facility's appliesTo forbids HOTEL.
      operationId: assignFacilityToHotel
      parameters:
        - $ref: '#/components/parameters/HotelId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityAssignmentRequest'
            example:
              facilityId: "11111111-aaaa-0000-0000-000000000003"
              isComplimentary: true
              notes: "Open 6am–10pm"
              createdBy: "admin"
      responses:
        '200':
          description: Facility assigned to the hotel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignedFacilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Facility
      summary: List a hotel's facilities
      operationId: getHotelFacilities
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Hotel facilities retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignedFacilityListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/facility/{facilityId}:
    delete:
      tags:
        - Facility
      summary: Unassign a facility from a hotel
      operationId: unassignFacilityFromHotel
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/FacilityId'
      responses:
        '204':
          description: Facility unassigned. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/facility:
    post:
      tags:
        - Facility
      summary: Assign a facility to a room
      description: Assigns a catalog facility to the room. Idempotent. 404 if the room or facility is missing; 400 if the facility's appliesTo forbids ROOM.
      operationId: assignFacilityToRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FacilityAssignmentRequest'
            example:
              facilityId: "11111111-aaaa-0000-0000-000000000002"
              isComplimentary: false
              additionalCharge: 250.00
              notes: "Per person, per night"
              createdBy: "admin"
      responses:
        '200':
          description: Facility assigned to the room.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignedFacilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
    get:
      tags:
        - Facility
      summary: List a room's facilities
      operationId: getRoomFacilities
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      responses:
        '200':
          description: Room facilities retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignedFacilityListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/facility/{facilityId}:
    delete:
      tags:
        - Facility
      summary: Unassign a facility from a room
      operationId: unassignFacilityFromRoom
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
        - $ref: '#/components/parameters/FacilityId'
      responses:
        '204':
          description: Facility unassigned. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/availability:
    get:
      tags:
        - Booking
      summary: Check room-type availability for a date range
      description: Returns units available (total_units − overlapping non-cancelled bookings) for the dates.
      operationId: checkAvailability
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
        - name: checkIn
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-07-01"
        - name: checkOut
          in: query
          required: true
          schema:
            type: string
            format: date
          example: "2026-07-03"
        - name: units
          in: query
          required: false
          schema:
            type: integer
            default: 1
          example: 1
      responses:
        '200':
          description: Availability computed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailabilityResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/room/{roomId}/booking:
    post:
      tags:
        - Booking
      summary: Create a booking for a room type
      description: |
        Books `units` of the room type for `[checkIn, checkOut)`. **Requires login** — the
        booking is recorded against the authenticated user. Runs in a transaction with a row
        lock to prevent overselling. Returns 400 if not enough units are available for the
        dates, the dates are invalid, or check-in is in the past; 404 if the room is missing.
      operationId: createBooking
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/RoomId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
            example:
              checkIn: "2026-07-01"
              checkOut: "2026-07-03"
              units: 1
              guestName: "Rafiyad"
              guestPhone: "+8801700000000"
              guestEmail: "guest@example.com"
              numberOfGuests: 2
              createdBy: "admin"
      responses:
        '201':
          description: Booking confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/booking:
    get:
      tags:
        - Booking
      summary: List a hotel's bookings
      operationId: getHotelBookings
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Bookings retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingListResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/booking/{bookingId}:
    get:
      tags:
        - Booking
      summary: Get a booking by id
      operationId: getBookingById
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking retrieved.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /hotel/{hotelId}/booking/{bookingId}/cancel:
    post:
      tags:
        - Booking
      summary: Cancel a booking
      description: Sets the booking status to CANCELLED, which frees its units for the dates. Idempotent.
      operationId: cancelBooking
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/BookingId'
      responses:
        '200':
          description: Booking cancelled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BookingResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /image/save/{hotelId}:
    post:
      tags:
        - Image
      summary: Upload one or more images for a hotel
      description: |
        Uploads one or more image files for the given hotel. Files must be sent
        under the `files` multipart key. Returns the list of persisted image
        records.
      operationId: saveImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - files
              properties:
                files:
                  type: array
                  description: One or more image files (required, at least one).
                  items:
                    type: string
                    format: binary
                createdBy:
                  type: string
                  description: Identifier of the user performing the upload.
                  example: "01518472276"
                isThumbnail:
                  type: boolean
                  description: Whether the server should generate a 400×300 thumbnail for each uploaded image. Defaults to true when omitted. (Note WebP cannot be thumbnailed and is skipped.)
                  default: true
                  example: true
            encoding:
              files:
                contentType: image/png, image/jpeg, image/webp
      responses:
        '200':
          description: Images uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
              example:
                message: "Images saved successfully"
                totalRecords: 1
                imageData:
                  - id: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
                    hotelId: "HTL-001"
                    fileUrl: "https://storage.example.com/hotels/HTL-001/room.png"
                    fileName: "room.png"
                    fileSizeBytes: 204812
                    roomId: null
                    thumbnailUrl: "https://storage.example.com/hotels/HTL-001/room_thumb.png"
                    isPrimary: false
                    displayOrder: 0
                    version: 0
                    mimeType: "image/png"
                    createdBy: "01518472276"
                    createdAt: "2025-09-21T15:33:27.429911"
                    updatedBy: null
                    updatedAt: null
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /image/{hotelId}:
    get:
      tags:
        - Image
      summary: Get all images for a hotel
      description: Retrieves all image records belonging to the given hotel.
      operationId: getAllByHotelId
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '200':
          description: Images retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageListResponse'
              example:
                message: "Images fetched successfully"
                totalRecords: 2
                imageData:
                  - id: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
                    hotelId: "HTL-001"
                    fileUrl: "https://storage.example.com/hotels/HTL-001/room.png"
                    fileName: "room.png"
                    fileSizeBytes: 204812
                    roomId: null
                    thumbnailUrl: "https://storage.example.com/hotels/HTL-001/room_thumb.png"
                    isPrimary: true
                    displayOrder: 0
                    version: 0
                    mimeType: "image/png"
                    createdBy: "01518472276"
                    createdAt: "2025-09-21T15:33:27.429911"
                    updatedBy: null
                    updatedAt: null
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Image
      summary: Delete all images for a hotel
      description: Deletes every image record (and associated stored files) for the given hotel.
      operationId: deleteAllByHotelId
      parameters:
        - $ref: '#/components/parameters/HotelId'
      responses:
        '204':
          description: All images for the hotel were deleted successfully. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /image/{hotelId}/{imageId}:
    get:
      tags:
        - Image
      summary: Get a single image by id
      description: Retrieves a single image record for the given hotel and image id.
      operationId: getImageById
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/ImageId'
      responses:
        '200':
          description: Image retrieved successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSingleResponse'
              example:
                message: "Image fetched successfully"
                imageData:
                  id: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
                  hotelId: "HTL-001"
                  fileUrl: "https://storage.example.com/hotels/HTL-001/room.png"
                  fileName: "room.png"
                  fileSizeBytes: 204812
                  roomId: null
                  thumbnailUrl: "https://storage.example.com/hotels/HTL-001/room_thumb.png"
                  isPrimary: false
                  displayOrder: 0
                  version: 0
                  mimeType: "image/png"
                  createdBy: "01518472276"
                  createdAt: "2025-09-21T15:33:27.429911"
                  updatedBy: null
                  updatedAt: null
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - Image
      summary: Replace an existing image
      description: |
        Replaces the file of an existing image record. The new file must be sent
        under the `file` multipart key.
      operationId: updateImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/ImageId'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Replacement image file (required).
                updatedBy:
                  type: string
                  description: Identifier of the user performing the update.
                  example: "01518472276"
                isThumbnail:
                  type: boolean
                  description: Whether to (re)generate a thumbnail for the replacement image. When omitted, the server keeps the previous behaviour (regenerates a thumbnail only if the existing image had one).
                  example: false
            encoding:
              file:
                contentType: image/png, image/jpeg, image/webp
      responses:
        '200':
          description: Image updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageSingleResponse'
              example:
                message: "Image updated successfully"
                imageData:
                  id: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
                  hotelId: "HTL-001"
                  fileUrl: "https://storage.example.com/hotels/HTL-001/room-v2.png"
                  fileName: "room-v2.png"
                  fileSizeBytes: 256000
                  roomId: null
                  thumbnailUrl: "https://storage.example.com/hotels/HTL-001/room-v2_thumb.png"
                  isPrimary: false
                  displayOrder: 0
                  version: 1
                  mimeType: "image/png"
                  createdBy: "01518472276"
                  createdAt: "2025-09-21T15:33:27.429911"
                  updatedBy: "01518472276"
                  updatedAt: "2025-09-22T10:11:05.120004"
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - Image
      summary: Delete a single image
      description: Deletes a single image record (and its stored file) for the given hotel and image id.
      operationId: deleteImage
      parameters:
        - $ref: '#/components/parameters/HotelId'
        - $ref: '#/components/parameters/ImageId'
      responses:
        '204':
          description: Image deleted successfully. No content.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: "JWT from POST /auth/login, sent as `Authorization: Bearer <token>`."
  parameters:
    HotelId:
      name: hotelId
      in: path
      required: true
      description: Unique identifier of the hotel.
      schema:
        type: string
      example: "HTL-001"
    ImageId:
      name: imageId
      in: path
      required: true
      description: Unique identifier of the image.
      schema:
        type: string
      example: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
    RoomId:
      name: roomId
      in: path
      required: true
      description: Unique identifier of the room.
      schema:
        type: string
      example: "b7e2d1a0-1111-2222-3333-444455556666"
    FacilityId:
      name: facilityId
      in: path
      required: true
      description: Unique identifier of the facility.
      schema:
        type: string
      example: "11111111-aaaa-0000-0000-000000000001"
    BookingId:
      name: bookingId
      in: path
      required: true
      description: Unique identifier of the booking.
      schema:
        type: string
      example: "c1d2e3f4-aaaa-bbbb-cccc-000000000001"
    UserId:
      name: userId
      in: path
      required: true
      description: Unique identifier of the user.
      schema:
        type: string
      example: "d4e5f6a7-bbbb-cccc-dddd-000000000001"

  schemas:
    Image:
      type: object
      description: A persisted hotel image record.
      properties:
        id:
          type: string
          description: Unique identifier of the image.
          example: "a3f1c2d4-35e9-11ea-aec2-2e728ce88125"
        hotelId:
          type: string
          description: Identifier of the hotel this image belongs to (tenant scope).
          example: "HTL-001"
        roomId:
          type: string
          nullable: true
          description: Identifier of the room this image belongs to. NULL for hotel-level (gallery) images; set for room-level images.
          example: null
        fileUrl:
          type: string
          description: Public URL of the stored image file.
          example: "https://storage.example.com/hotels/HTL-001/room.png"
        fileName:
          type: string
          description: Original file name.
          example: "room.png"
        fileSizeBytes:
          type: integer
          format: int64
          description: Size of the file in bytes.
          example: 204812
        thumbnailUrl:
          type: string
          nullable: true
          description: URL of the server-generated thumbnail (400×300). Null when no thumbnail was generated (e.g. WebP, or isThumbnail=false on upload).
          example: "https://storage.example.com/hotels/HTL-001/room_thumb.png"
        isPrimary:
          type: boolean
          description: Whether this is the primary image for the hotel.
          example: false
        displayOrder:
          type: integer
          description: Ordering position used when listing images.
          example: 0
        version:
          type: integer
          format: int64
          nullable: true
          description: Optimistic-locking version number.
          example: 0
        mimeType:
          type: string
          description: MIME type of the stored file.
          example: "image/png"
        createdBy:
          type: string
          nullable: true
          description: Identifier of the user who created the record.
          example: "01518472276"
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the record was created.
          example: "2025-09-21T15:33:27.429911"
        updatedBy:
          type: string
          nullable: true
          description: Identifier of the user who last updated the record.
          example: "01518472276"
        updatedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the record was last updated.
          example: "2025-09-22T10:11:05.120004"

    ImageListResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable result message.
          example: "Images saved successfully"
        totalRecords:
          type: integer
          description: Number of image records returned.
          example: 1
        imageData:
          type: array
          description: List of image records.
          items:
            $ref: '#/components/schemas/Image'

    ImageSingleResponse:
      type: object
      properties:
        message:
          type: string
          description: Human-readable result message.
          example: "Image fetched successfully"
        imageData:
          $ref: '#/components/schemas/Image'

    Hotel:
      type: object
      description: A hotel record.
      properties:
        id:
          type: string
          description: Unique identifier of the hotel (also used as hotelId everywhere).
          example: "1111"
        name:
          type: string
          example: "Lake View Resort"
        description:
          type: string
          nullable: true
        checkInTime:
          type: string
          nullable: true
          description: Local check-in time (HH:mm:ss).
          example: "14:00:00"
        checkOutTime:
          type: string
          nullable: true
          description: Local check-out time (HH:mm:ss).
          example: "12:00:00"
        mobile:
          type: string
          nullable: true
          example: "+8801700000000"
        email:
          type: string
          nullable: true
          example: "info@lakeview.example"
        website:
          type: string
          nullable: true
          example: "https://lakeview.example"
        address:
          type: string
          nullable: true
          example: "Kaptai, Rangamati"
        googleMapUrl:
          type: string
          nullable: true
        version:
          type: integer
          format: int64
          nullable: true
          description: Optimistic-locking version.
          example: 0
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        images:
          type: array
          nullable: true
          description: Hotel images. Not yet embedded in responses (currently null).
          items:
            $ref: '#/components/schemas/Image'
        rooms:
          type: array
          nullable: true
          description: Hotel rooms. Not yet embedded in responses (currently null).
          items:
            type: object

    HotelRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Lake View Resort"
        description:
          type: string
        checkInTime:
          type: string
          description: Local check-in time (HH:mm:ss).
          example: "14:00:00"
        checkOutTime:
          type: string
          description: Local check-out time (HH:mm:ss).
          example: "12:00:00"
        mobile:
          type: string
          example: "+8801700000000"
        email:
          type: string
          example: "info@lakeview.example"
        website:
          type: string
          example: "https://lakeview.example"
        address:
          type: string
          example: "Kaptai, Rangamati"
        googleMapUrl:
          type: string
        createdBy:
          type: string
          description: Set on create.
        updatedBy:
          type: string
          description: Set on update.

    HotelResponse:
      type: object
      properties:
        message:
          type: string
          example: "Hotel created successfully"
        hotelData:
          $ref: '#/components/schemas/Hotel'

    HotelListResponse:
      type: object
      properties:
        message:
          type: string
          example: "Hotels retrieved successfully"
        totalRecords:
          type: integer
          example: 2
        hotelData:
          type: array
          items:
            $ref: '#/components/schemas/Hotel'

    Room:
      type: object
      description: A room record with its embedded image gallery.
      properties:
        id:
          type: string
          example: "b7e2d1a0-1111-2222-3333-444455556666"
        hotelId:
          type: string
          example: "1111"
        hotelName:
          type: string
          nullable: true
          description: Reserved; not yet populated.
        roomName:
          type: string
          example: "Deluxe King"
        capacity:
          type: integer
          description: Guests per unit.
          example: 2
        totalUnits:
          type: integer
          description: Number of physical rooms of this type (e.g. 7 Premium rooms).
          example: 7
        roomType:
          type: string
          nullable: true
          example: "DELUXE"
        isAirConditioned:
          type: boolean
          example: true
        description:
          type: string
          nullable: true
        prerequisites:
          type: string
          nullable: true
        pricePerNight:
          type: number
          format: double
          example: 1500.00
        discount:
          type: number
          format: double
          example: 100.00
        isAvailable:
          type: boolean
          example: true
        version:
          type: integer
          format: int64
          nullable: true
          example: 0
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
        images:
          type: array
          description: The room's images, ordered by display order. Empty for a room with no images.
          items:
            $ref: '#/components/schemas/Image'

    RoomRequest:
      type: object
      required:
        - roomName
      properties:
        roomName:
          type: string
          example: "Deluxe King"
        capacity:
          type: integer
          description: Guests per unit. Defaults to 1 when omitted.
          example: 2
        totalUnits:
          type: integer
          description: Number of physical rooms of this type. Defaults to 1 when omitted.
          example: 7
        roomType:
          type: string
          example: "DELUXE"
        isAirConditioned:
          type: boolean
          example: true
        description:
          type: string
        prerequisites:
          type: string
        pricePerNight:
          type: number
          format: double
          description: Defaults to 0 when omitted.
          example: 1500.00
        discount:
          type: number
          format: double
          description: Defaults to 0 when omitted.
          example: 100.00
        isAvailable:
          type: boolean
          description: Defaults to true when omitted.
          example: true
        createdBy:
          type: string
        updatedBy:
          type: string

    RoomResponse:
      type: object
      properties:
        message:
          type: string
          example: "Room created successfully"
        roomData:
          $ref: '#/components/schemas/Room'

    RoomListResponse:
      type: object
      properties:
        message:
          type: string
          example: "Rooms retrieved successfully"
        totalRecords:
          type: integer
          example: 3
        roomData:
          type: array
          items:
            $ref: '#/components/schemas/Room'

    Facility:
      type: object
      description: A catalog facility.
      properties:
        id:
          type: string
          example: "11111111-aaaa-0000-0000-000000000001"
        name:
          type: string
          example: "Free WiFi"
        category:
          type: string
          nullable: true
          example: "CONNECTIVITY"
        icon:
          type: string
          nullable: true
          example: "wifi"
        description:
          type: string
          nullable: true
        appliesTo:
          type: string
          enum: [HOTEL, ROOM, BOTH]
          example: "BOTH"
        isActive:
          type: boolean
          example: true
        version:
          type: integer
          format: int64
          nullable: true
          example: 0
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    FacilityRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          example: "Free WiFi"
        category:
          type: string
        icon:
          type: string
        description:
          type: string
        appliesTo:
          type: string
          enum: [HOTEL, ROOM, BOTH]
          description: Defaults to BOTH when omitted.
        isActive:
          type: boolean
          description: Defaults to true when omitted.
        createdBy:
          type: string
        updatedBy:
          type: string

    FacilityResponse:
      type: object
      properties:
        message:
          type: string
          example: "Facility created successfully"
        facilityData:
          $ref: '#/components/schemas/Facility'

    FacilityListResponse:
      type: object
      properties:
        message:
          type: string
          example: "Facilities retrieved successfully"
        totalRecords:
          type: integer
          example: 8
        facilityData:
          type: array
          items:
            $ref: '#/components/schemas/Facility'

    FacilityAssignmentRequest:
      type: object
      required:
        - facilityId
      properties:
        facilityId:
          type: string
          example: "11111111-aaaa-0000-0000-000000000003"
        isComplimentary:
          type: boolean
          description: Whether this offering is free. Defaults to true.
          example: true
        additionalCharge:
          type: number
          format: double
          nullable: true
          description: Charge when not complimentary.
          example: 250.00
        notes:
          type: string
          nullable: true
          example: "Open 6am–10pm"
        createdBy:
          type: string

    AssignedFacility:
      type: object
      description: A facility as offered by a hotel/room — the catalog facility plus the link attributes.
      properties:
        facility:
          $ref: '#/components/schemas/Facility'
        isComplimentary:
          type: boolean
          example: true
        additionalCharge:
          type: number
          format: double
          nullable: true
          example: 250.00
        notes:
          type: string
          nullable: true

    AssignedFacilityResponse:
      type: object
      properties:
        message:
          type: string
          example: "Facility assigned to hotel"
        data:
          $ref: '#/components/schemas/AssignedFacility'

    AssignedFacilityListResponse:
      type: object
      properties:
        message:
          type: string
          example: "Hotel facilities retrieved successfully"
        totalRecords:
          type: integer
          example: 3
        data:
          type: array
          items:
            $ref: '#/components/schemas/AssignedFacility'

    Booking:
      type: object
      description: A reservation of a room type for a date range.
      properties:
        id:
          type: string
          example: "c1d2e3f4-aaaa-bbbb-cccc-000000000001"
        hotelId:
          type: string
          example: "1111"
        roomId:
          type: string
          example: "b7e2d1a0-1111-2222-3333-444455556666"
        userId:
          type: string
          nullable: true
          description: The authenticated user who made the booking.
        checkIn:
          type: string
          format: date
          example: "2026-07-01"
        checkOut:
          type: string
          format: date
          example: "2026-07-03"
        units:
          type: integer
          example: 1
        guestName:
          type: string
          example: "Rafiyad"
        guestPhone:
          type: string
          nullable: true
        guestEmail:
          type: string
          nullable: true
        numberOfGuests:
          type: integer
          nullable: true
          example: 2
        status:
          type: string
          enum: [CONFIRMED, CANCELLED]
          example: "CONFIRMED"
        totalPrice:
          type: number
          format: double
          nullable: true
          description: Snapshot = nights × units × (pricePerNight − discount).
          example: 5800.00
        version:
          type: integer
          format: int64
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    BookingRequest:
      type: object
      required:
        - checkIn
        - checkOut
        - guestName
      properties:
        checkIn:
          type: string
          format: date
          example: "2026-07-01"
        checkOut:
          type: string
          format: date
          description: Must be after checkIn.
          example: "2026-07-03"
        units:
          type: integer
          description: Rooms of this type to book. Defaults to 1.
          example: 1
        guestName:
          type: string
          example: "Rafiyad"
        guestPhone:
          type: string
        guestEmail:
          type: string
        numberOfGuests:
          type: integer
          example: 2
        createdBy:
          type: string

    BookingResponse:
      type: object
      properties:
        message:
          type: string
          example: "Booking confirmed"
        bookingData:
          $ref: '#/components/schemas/Booking'

    BookingListResponse:
      type: object
      properties:
        message:
          type: string
          example: "Bookings retrieved successfully"
        totalRecords:
          type: integer
          example: 2
        bookingData:
          type: array
          items:
            $ref: '#/components/schemas/Booking'

    AvailabilityResponse:
      type: object
      properties:
        roomId:
          type: string
        checkIn:
          type: string
          format: date
        checkOut:
          type: string
          format: date
        totalUnits:
          type: integer
          example: 7
        bookedUnits:
          type: integer
          example: 2
        availableUnits:
          type: integer
          example: 5
        requestedUnits:
          type: integer
          example: 1
        available:
          type: boolean
          description: True when availableUnits >= requestedUnits.
          example: true

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - mobile
        - gender
        - password
      properties:
        name:
          type: string
          example: "Rafiyad"
        email:
          type: string
          format: email
          description: Must be a valid, unique email address.
          example: "rafiyad@example.com"
        mobile:
          type: string
          description: Must be unique. 6–20 digits, optionally prefixed with '+'.
          example: "+8801700000000"
        gender:
          type: string
          enum: [MALE, FEMALE]
          description: Required. Case-insensitive on input; stored uppercase.
          example: "MALE"
        password:
          type: string
          format: password
          minLength: 6
          example: "secret123"

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          example: "rafiyad@example.com"
        password:
          type: string
          format: password
          example: "secret123"

    AuthResponse:
      type: object
      properties:
        token:
          type: string
          description: "JWT to send as `Authorization: Bearer <token>`."
        tokenType:
          type: string
          example: "Bearer"
        userId:
          type: string
        email:
          type: string
        roles:
          type: array
          items:
            type: string
          example: ["USER"]

    User:
      type: object
      description: A user account (password hash is never returned).
      properties:
        id:
          type: string
        name:
          type: string
          example: "Rafiyad"
        email:
          type: string
          example: "rafiyad@example.com"
        mobile:
          type: string
          nullable: true
          example: "+8801700000000"
        gender:
          type: string
          enum: [MALE, FEMALE]
          nullable: true
          example: "MALE"
        isActive:
          type: boolean
          example: true
        roles:
          type: array
          items:
            type: string
          example: ["USER"]
        version:
          type: integer
          format: int64
          nullable: true
        createdBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedBy:
          type: string
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true

    UserResponse:
      type: object
      properties:
        message:
          type: string
          example: "Registration successful"
        userData:
          $ref: '#/components/schemas/User'

    Profile:
      type: object
      description: A user's own profile view; email and mobile are masked.
      properties:
        id:
          type: string
        name:
          type: string
          example: "Rafiyad"
        email:
          type: string
          description: Masked — only the last 4 chars of the local part are shown.
          example: "***iyad@example.com"
        mobile:
          type: string
          description: Masked — only the last 4 digits are shown.
          example: "**********2276"
        gender:
          type: string
          enum: [MALE, FEMALE]
          nullable: true
          example: "MALE"
        isActive:
          type: boolean
          example: true
        roles:
          type: array
          items:
            type: string
          example: ["USER"]

    ProfileResponse:
      type: object
      properties:
        message:
          type: string
          example: "Profile"
        profileData:
          $ref: '#/components/schemas/Profile'

    UserListResponse:
      type: object
      properties:
        message:
          type: string
          example: "Users retrieved successfully"
        totalRecords:
          type: integer
          example: 3
        userData:
          type: array
          items:
            $ref: '#/components/schemas/User'

    ErrorResponse:
      type: object
      required:
        - status
        - error
        - message
        - timestamp
      properties:
        status:
          type: integer
          description: HTTP status code associated with the error.
          example: 400
        error:
          type: string
          description: Short error category.
          example: "Validation Error"
        message:
          type: string
          description: Detailed error message.
          example: "At least one file is required under the 'files' key"
        timestamp:
          type: string
          format: date-time
          description: Time when the error occurred.
          example: "2025-09-21T15:33:27.429911"

  responses:
    BadRequest:
      description: Bad Request - validation failed.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            ValidationError:
              value:
                status: 400
                error: "Validation Error"
                message: "At least one file is required under the 'files' key"
                timestamp: "2025-09-21T15:33:27.429911"
    NotFound:
      description: Not Found - the requested image or hotel does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            NotFound:
              value:
                status: 404
                error: "Not Found"
                message: "No image found for the given id"
                timestamp: "2025-09-21T15:33:27.429911"
    Unauthorized:
      description: Unauthorized — missing/invalid token or bad credentials.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Unauthorized:
              value:
                status: 401
                error: "Unauthorized"
                message: "Invalid email or password"
                timestamp: "2025-09-21T15:33:27.429911"
    Forbidden:
      description: Forbidden — authenticated but lacks the required role.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Forbidden:
              value:
                status: 403
                error: "Forbidden"
                message: "Access denied"
                timestamp: "2025-09-21T15:33:27.429911"
    Conflict:
      description: Conflict — duplicate of an existing unique value (e.g. email/mobile already registered).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            Conflict:
              value:
                status: 409
                error: "Conflict"
                message: "Email is already registered"
                timestamp: "2025-09-21T15:33:27.429911"
    InternalServerError:
      description: Internal Server Error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            InternalError:
              value:
                status: 500
                error: "Internal Server Error"
                message: "Error occurred while processing the image"
                timestamp: "2025-09-21T15:33:27.429911"
